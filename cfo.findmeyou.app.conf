<VirtualHost *:80>
    ServerName cfo.findmeyou.app

    DocumentRoot /var/www/cfo.findmeyou.app/frontend

    <Directory /var/www/cfo.findmeyou.app/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:3033/api/
    ProxyPassReverse /api/ http://127.0.0.1:3033/api/
    # In case trailing slash is omitted
    ProxyPass /api http://127.0.0.1:3033/api
    ProxyPassReverse /api http://127.0.0.1:3033/api

    ErrorLog ${APACHE_LOG_DIR}/cfo.findmeyou.app_error.log
    CustomLog ${APACHE_LOG_DIR}/cfo.findmeyou.app_access.log combined
</VirtualHost>
